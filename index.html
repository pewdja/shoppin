<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shopping List Promax</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="container">
    <h2>Shopping List Promaximus</h2>
    <div class="input-group">
        <input type="text" id="itemInput" placeholder="Item name...">
        <input type="number" id="priceInput" placeholder="Price..." min="0" step="0.01">
        <button id="addBtn">Add</button>
        
    </div>
    
    <ul id="shoppingList"></ul>
    
    <div class="total">Total Cost: <span id="totalCost">0.00</span></div>
    <button id="clearBtn" class="clear-btn">Clear List</button>
    <button id="sortBtn" class="sort-btn">Sort by Price</button>    
</div>


</body>
<script src="shoppin.js"></script>
</html>
